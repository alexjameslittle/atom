name: Setup toolchain
description: Install mise, bootstrap tools, optionally set up Android SDK, and configure BuildBuddy

inputs:
  buildbuddy-api-key:
    description: BuildBuddy API key for remote cache
    required: false
  setup-android:
    description: Whether to install and configure the Android SDK
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Cache mise installs
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/mise
          ~/.local/share/mise
        key: ${{ runner.os }}-mise-${{ hashFiles('mise.toml') }}

    - name: Install mise
      shell: bash
      run: |
        curl https://mise.run | sh
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Bootstrap toolchain
      shell: bash
      run: |
        mise trust -y
        mise install

    - name: Set up Android SDK
      if: inputs.setup-android == 'true'
      uses: android-actions/setup-android@v3
      with:
        packages: platforms;android-35 build-tools;35.0.0 ndk;27.2.12479018

    - name: Set ANDROID_NDK_HOME
      if: inputs.setup-android == 'true'
      shell: bash
      run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

    - name: Setup BuildBuddy
      if: inputs.buildbuddy-api-key != ''
      shell: bash
      run: scripts/setup-buildbuddy.sh "${{ inputs.buildbuddy-api-key }}"
