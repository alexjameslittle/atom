name: GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: github-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ATOM_ARTIFACT_NAME: atom-macos-arm64
  ATOM_BINARY_NAME: atom-darwin-arm64

jobs:
  build-atom-macos-arm64:
    name: build atom macOS arm64 binary
    uses: ./.github/workflows/cli-binary.yml
    secrets: inherit

  create-release:
    name: create GitHub prerelease
    runs-on: macos-15
    needs:
      - build-atom-macos-arm64
    steps:
      - name: Download atom artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.ATOM_ARTIFACT_NAME }}
          path: dist

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp "dist/${ATOM_BINARY_NAME}" "release/${ATOM_BINARY_NAME}"
          chmod 755 "release/${ATOM_BINARY_NAME}"
          (
            cd release
            shasum -a 256 "${ATOM_BINARY_NAME}" > "${ATOM_BINARY_NAME}.sha256"
            tar -czf "${ATOM_BINARY_NAME}.tar.gz" "${ATOM_BINARY_NAME}"
            ls -lh \
              "${ATOM_BINARY_NAME}" \
              "${ATOM_BINARY_NAME}.sha256" \
              "${ATOM_BINARY_NAME}.tar.gz"
          )

      - name: Smoke test release binary
        shell: bash
        run: |
          set -euo pipefail
          "./release/${ATOM_BINARY_NAME}" --help > /tmp/atom-help.txt
          sed -n '1,20p' /tmp/atom-help.txt

      - name: Publish prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          assets=(
            "release/${ATOM_BINARY_NAME}"
            "release/${ATOM_BINARY_NAME}.sha256"
            "release/${ATOM_BINARY_NAME}.tar.gz"
          )

          for asset in "${assets[@]}"; do
            [[ -f "${asset}" ]] || {
              echo "Missing release asset: ${asset}" >&2
              exit 1
            }
          done

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --prerelease
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" \
              --title "${GITHUB_REF_NAME}" \
              --prerelease \
              --generate-notes
          fi
