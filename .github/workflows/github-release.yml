name: GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: github-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ATOM_ARTIFACT_NAME: atom-macos-arm64
  ATOM_BINARY_NAME: atom-darwin-arm64

jobs:
  build-atom-macos-arm64:
    name: build atom macOS arm64 binary
    uses: ./.github/workflows/cli-binary.yml
    secrets: inherit

  create-release:
    name: create GitHub prerelease
    runs-on: macos-15
    needs:
      - build-atom-macos-arm64
    steps:
      - name: Download atom artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ env.ATOM_ARTIFACT_NAME }}
          path: dist

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          binary="dist/${ATOM_BINARY_NAME}"
          chmod 755 "$binary"
          shasum -a 256 "$binary" > "${binary}.sha256"
          ls -lh "$binary" "${binary}.sha256"

      - name: Smoke test release binary
        shell: bash
        run: |
          set -euo pipefail
          "./dist/${ATOM_BINARY_NAME}" --help > /tmp/atom-help.txt
          sed -n '1,20p' /tmp/atom-help.txt

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/${{ env.ATOM_BINARY_NAME }}
            dist/${{ env.ATOM_BINARY_NAME }}.sha256
