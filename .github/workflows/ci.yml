name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache mise installs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mise
            ~/.local/share/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('mise.toml', '.bazelversion') }}

      - name: Cache Bazel state
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: ${{ runner.os }}-bazel-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Bootstrap toolchain
        run: |
          mise trust -y
          mise install

      - name: Setup BuildBuddy
        run: scripts/setup-buildbuddy.sh "$BUILDBUDDY_API_KEY"
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Verify
        run: mise run ci
