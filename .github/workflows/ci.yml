name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  lint:
    name: lint
    runs-on: namespace-profile-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup
        uses: ./.github/actions/setup
        with:
          buildbuddy-api-key: ${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Lint
        run: mise exec -- ./scripts/verify.sh lint

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: namespace-profile-linux
          - os: macos
            runner: namespace-profile-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup
        uses: ./.github/actions/setup
        with:
          buildbuddy-api-key: ${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Test
        run: mise exec -- ./scripts/verify.sh test

  build-example-apps:
    name: build example apps (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ios
            runner: namespace-profile-macos
            verify_mode: build-ios
          - platform: android
            runner: namespace-profile-linux
            verify_mode: build-android
            setup_android: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup
        uses: ./.github/actions/setup
        with:
          buildbuddy-api-key: ${{ secrets.BUILDBUDDY_API_KEY }}
          setup-android: ${{ matrix.setup_android || 'false' }}

      - name: Build ${{ matrix.platform }} app
        run: mise exec -- ./scripts/verify.sh ${{ matrix.verify_mode }}
