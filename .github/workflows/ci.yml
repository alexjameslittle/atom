name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache mise installs
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/mise
            ~/.local/share/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('mise.toml', '.bazelversion') }}

      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Bootstrap toolchain
        run: |
          mise trust -y
          mise install

      - name: Setup BuildBuddy
        run: scripts/setup-buildbuddy.sh "$BUILDBUDDY_API_KEY"

      - name: Lint
        run: mise exec -- ./scripts/verify.sh lint

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
          - os: macos
            runner: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache mise installs
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/mise
            ~/.local/share/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('mise.toml', '.bazelversion') }}

      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Bootstrap toolchain
        run: |
          mise trust -y
          mise install

      - name: Setup BuildBuddy
        run: scripts/setup-buildbuddy.sh "$BUILDBUDDY_API_KEY"

      - name: Test
        run: mise exec -- ./scripts/verify.sh test
